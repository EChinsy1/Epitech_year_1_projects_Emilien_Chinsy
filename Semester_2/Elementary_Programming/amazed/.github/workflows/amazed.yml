name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    container: epitechcontent/epitest-docker:latest
    steps:
    - uses: actions/checkout@v4
    - name: make
      run: make
    - name: make tests
      run: make tests_run